<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" width="980" height="640" font-family="'Segoe UI', Arial, sans-serif">

  <defs>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f0883e"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3fb950"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#79c0ff"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f85149"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#e3b341"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="980" height="640" fill="#0d1117" rx="12"/>

  <!-- Title -->
  <text x="490" y="36" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="bold">🧵 Custom Thread Pool — System Architecture</text>
  <text x="490" y="54" text-anchor="middle" fill="#484f58" font-size="10">Node.js · worker_threads · no external dependencies</text>

  <!-- ══════════ MAIN THREAD ══════════ -->
  <rect x="22" y="68" width="190" height="238" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="117" y="89" text-anchor="middle" fill="#58a6ff" font-size="12" font-weight="bold">MAIN THREAD</text>
  <text x="117" y="104" text-anchor="middle" fill="#8b949e" font-size="9">(Event Loop — stays responsive)</text>

  <rect x="36" y="112" width="162" height="28" rx="5" fill="#1f2937" stroke="#374151"/>
  <text x="117" y="125" text-anchor="middle" fill="#d2a8ff" font-size="10" font-weight="bold">pool.addTask(fn, ...args)</text>
  <text x="117" y="137" text-anchor="middle" fill="#6e7681" font-size="8">wraps fn + args in task object</text>

  <text x="36" y="160" fill="#8b949e" font-size="8" font-weight="bold">example() — 3 real tasks:</text>

  <rect x="36" y="166" width="162" height="30" rx="4" fill="#1a1e2e" stroke="#30363d"/>
  <text x="117" y="179" text-anchor="middle" fill="#79c0ff" font-size="8.5" font-weight="bold">Task 1 — Sum Loop</text>
  <text x="117" y="191" text-anchor="middle" fill="#6e7681" font-size="7.5">args: (5, 10) · returns sum + x+y</text>

  <rect x="36" y="200" width="162" height="30" rx="4" fill="#1a1e2e" stroke="#30363d"/>
  <text x="117" y="213" text-anchor="middle" fill="#79c0ff" font-size="8.5" font-weight="bold">Task 2 — toUpperCase</text>
  <text x="117" y="225" text-anchor="middle" fill="#6e7681" font-size="7.5">args: ("hello world")</text>

  <rect x="36" y="234" width="162" height="30" rx="4" fill="#1a1e2e" stroke="#30363d"/>
  <text x="117" y="247" text-anchor="middle" fill="#79c0ff" font-size="8.5" font-weight="bold">Task 3 — Factorial</text>
  <text x="117" y="259" text-anchor="middle" fill="#6e7681" font-size="7.5">args: (10)</text>

  <rect x="36" y="269" width="162" height="24" rx="4" fill="#0d2d4a" stroke="#388bfd" stroke-width="1"/>
  <text x="117" y="285" text-anchor="middle" fill="#79c0ff" font-size="9">Promise.all(tasks)</text>

  <!-- ══════════ TASK QUEUE ══════════ -->
  <rect x="260" y="68" width="185" height="390" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="352" y="89" text-anchor="middle" fill="#f0883e" font-size="12" font-weight="bold">TASK QUEUE</text>
  <text x="352" y="104" text-anchor="middle" fill="#8b949e" font-size="9">FIFO — this.taskQueue (Array)</text>

  <rect x="275" y="113" width="155" height="40" rx="6" fill="#1c2333" stroke="#f0883e" stroke-width="1.2"/>
  <text x="352" y="129" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">Task Object #1</text>
  <text x="352" y="143" text-anchor="middle" fill="#8b949e" font-size="8">{ id, fn: fn.toString(), args, resolve, reject }</text>

  <rect x="275" y="159" width="155" height="40" rx="6" fill="#1c2333" stroke="#f0883e" stroke-width="1.2"/>
  <text x="352" y="175" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">Task Object #2</text>
  <text x="352" y="189" text-anchor="middle" fill="#8b949e" font-size="8">{ id, fn: fn.toString(), args, resolve, reject }</text>

  <rect x="275" y="205" width="155" height="40" rx="6" fill="#1c2333" stroke="#f0883e" stroke-width="1.2"/>
  <text x="352" y="221" text-anchor="middle" fill="#f0883e" font-size="10" font-weight="bold">Task Object #3</text>
  <text x="352" y="235" text-anchor="middle" fill="#8b949e" font-size="8">{ id, fn: fn.toString(), args, resolve, reject }</text>

  <circle cx="352" cy="260" r="3" fill="#484f58"/>
  <circle cx="352" cy="272" r="3" fill="#484f58"/>
  <circle cx="352" cy="284" r="3" fill="#484f58"/>

  <rect x="275" y="296" width="155" height="32" rx="6" fill="#0d419d" stroke="#388bfd" stroke-width="1"/>
  <text x="352" y="311" text-anchor="middle" fill="#79c0ff" font-size="10" font-weight="bold">_processQueue()</text>
  <text x="352" y="323" text-anchor="middle" fill="#6e7681" font-size="8">while loop — checks capacity</text>

  <text x="352" y="348" text-anchor="middle" fill="#8b949e" font-size="8.5">activeThreads &lt; maxThreads (4)?</text>
  <text x="352" y="362" text-anchor="middle" fill="#3fb950" font-size="8.5">YES → taskQueue.shift() → _executeTask()</text>
  <text x="352" y="376" text-anchor="middle" fill="#f85149" font-size="8.5">NO → task stays in queue</text>

  <rect x="275" y="392" width="155" height="56" rx="6" fill="#1c2333" stroke="#30363d"/>
  <text x="352" y="408" text-anchor="middle" fill="#8b949e" font-size="8.5" font-weight="bold">getStats()</text>
  <text x="352" y="422" text-anchor="middle" fill="#d2a8ff" font-size="8">activeThreads: this.activeThreads</text>
  <text x="352" y="435" text-anchor="middle" fill="#d2a8ff" font-size="8">queuedTasks: this.taskQueue.length</text>
  <text x="352" y="448" text-anchor="middle" fill="#d2a8ff" font-size="8">maxThreads: this.maxThreads</text>

  <!-- ══════════ WORKERS ══════════ -->
  <rect x="498" y="68" width="210" height="390" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="603" y="89" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="bold">WORKERS</text>
  <text x="603" y="104" text-anchor="middle" fill="#8b949e" font-size="9">new Worker(worker.js) per task · max 4</text>

  <rect x="512" y="112" width="182" height="62" rx="6" fill="#0f2a1a" stroke="#3fb950" stroke-width="1.2"/>
  <text x="603" y="128" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">Worker Thread 1  ● active</text>
  <text x="603" y="142" text-anchor="middle" fill="#8b949e" font-size="8">worker.postMessage({ id, fn, args })</text>
  <text x="603" y="155" text-anchor="middle" fill="#6e7681" font-size="8">on("message") → resolve · terminate()</text>
  <text x="603" y="167" text-anchor="middle" fill="#6e7681" font-size="8">on("error")   → reject  · terminate()</text>

  <rect x="512" y="181" width="182" height="62" rx="6" fill="#0f2a1a" stroke="#3fb950" stroke-width="1.2"/>
  <text x="603" y="197" text-anchor="middle" fill="#3fb950" font-size="10" font-weight="bold">Worker Thread 2  ● active</text>
  <text x="603" y="211" text-anchor="middle" fill="#8b949e" font-size="8">worker.postMessage({ id, fn, args })</text>
  <text x="603" y="224" text-anchor="middle" fill="#6e7681" font-size="8">on("message") → resolve · terminate()</text>
  <text x="603" y="236" text-anchor="middle" fill="#6e7681" font-size="8">on("error")   → reject  · terminate()</text>

  <rect x="512" y="250" width="182" height="44" rx="6" fill="#1c2333" stroke="#484f58" stroke-width="1.2"/>
  <text x="603" y="268" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="bold">Worker Thread 3  ○ idle</text>
  <text x="603" y="284" text-anchor="middle" fill="#484f58" font-size="8">not yet spawned — waiting in queue</text>

  <rect x="512" y="301" width="182" height="44" rx="6" fill="#1c2333" stroke="#484f58" stroke-width="1.2"/>
  <text x="603" y="319" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="bold">Worker Thread 4  ○ idle</text>
  <text x="603" y="335" text-anchor="middle" fill="#484f58" font-size="8">not yet spawned — waiting in queue</text>

  <rect x="512" y="354" width="182" height="26" rx="5" fill="#0d2d4a" stroke="#388bfd" stroke-width="1"/>
  <text x="603" y="371" text-anchor="middle" fill="#79c0ff" font-size="9">activeThreads++ on spawn · -- on done</text>

  <rect x="512" y="388" width="182" height="58" rx="5" fill="#1a1409" stroke="#e3b341" stroke-width="1.2"/>
  <text x="603" y="403" text-anchor="middle" fill="#e3b341" font-size="9" font-weight="bold">⚠️ Per-Task Lifecycle</text>
  <text x="603" y="417" text-anchor="middle" fill="#8b949e" font-size="8">new Worker() spawned per task</text>
  <text x="603" y="430" text-anchor="middle" fill="#8b949e" font-size="8">worker.terminate() after result</text>
  <text x="603" y="443" text-anchor="middle" fill="#f85149" font-size="8">No worker reuse / pooling</text>

  <!-- ══════════ WORKER.JS ══════════ -->
  <rect x="760" y="68" width="198" height="210" rx="10" fill="#161b22" stroke="#e3b341" stroke-width="1.5"/>
  <text x="859" y="89" text-anchor="middle" fill="#e3b341" font-size="12" font-weight="bold">worker.js</text>
  <text x="859" y="104" text-anchor="middle" fill="#8b949e" font-size="9">parentPort — runs in worker thread</text>

  <rect x="774" y="112" width="170" height="30" rx="5" fill="#1a1409" stroke="#e3b341" stroke-width="1"/>
  <text x="859" y="125" text-anchor="middle" fill="#e3b341" font-size="8.5">parentPort.on("message", task => {})</text>
  <text x="859" y="138" text-anchor="middle" fill="#6e7681" font-size="7.5">receives { id, fn, args }</text>

  <rect x="774" y="148" width="170" height="28" rx="5" fill="#2a1a00" stroke="#e3b341" stroke-width="1"/>
  <text x="859" y="161" text-anchor="middle" fill="#ffa657" font-size="9" font-weight="bold">eval(`(${task.fn})`)</text>
  <text x="859" y="173" text-anchor="middle" fill="#6e7681" font-size="7.5">reconstructs fn from string</text>

  <rect x="774" y="182" width="170" height="24" rx="5" fill="#0f2a1a" stroke="#3fb950" stroke-width="1"/>
  <text x="859" y="198" text-anchor="middle" fill="#3fb950" font-size="8.5">fn(...task.args) → result</text>

  <rect x="774" y="212" width="170" height="24" rx="5" fill="#0d2d4a" stroke="#388bfd" stroke-width="1"/>
  <text x="859" y="228" text-anchor="middle" fill="#79c0ff" font-size="8.5">parentPort.postMessage({ id, result, error })</text>

  <rect x="774" y="242" width="170" height="24" rx="5" fill="#2d0f0f" stroke="#f85149" stroke-width="1"/>
  <text x="859" y="258" text-anchor="middle" fill="#f85149" font-size="8.5">catch → postMessage({ error: e.message })</text>

  <!-- ══════════ RESULTS ══════════ -->
  <rect x="760" y="298" width="198" height="160" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="859" y="319" text-anchor="middle" fill="#79c0ff" font-size="12" font-weight="bold">RESULTS</text>
  <text x="859" y="334" text-anchor="middle" fill="#8b949e" font-size="9">back on main thread via callback</text>

  <rect x="774" y="342" width="170" height="28" rx="5" fill="#0d2d4a" stroke="#388bfd" stroke-width="1"/>
  <text x="859" y="355" text-anchor="middle" fill="#79c0ff" font-size="9" font-weight="bold">Promise.resolve(result)</text>
  <text x="859" y="366" text-anchor="middle" fill="#6e7681" font-size="7.5">"Task 1 result: 15, sum: 499999500000"</text>

  <rect x="774" y="376" width="170" height="28" rx="5" fill="#0d2d4a" stroke="#388bfd" stroke-width="1"/>
  <text x="859" y="389" text-anchor="middle" fill="#79c0ff" font-size="9" font-weight="bold">Promise.resolve(result)</text>
  <text x="859" y="400" text-anchor="middle" fill="#6e7681" font-size="7.5">"Processed: HELLO WORLD"</text>

  <rect x="774" y="410" width="170" height="28" rx="5" fill="#0d2d4a" stroke="#388bfd" stroke-width="1"/>
  <text x="859" y="423" text-anchor="middle" fill="#79c0ff" font-size="9" font-weight="bold">Promise.resolve(result)</text>
  <text x="859" y="434" text-anchor="middle" fill="#6e7681" font-size="7.5">"Factorial of 10 is 3628800"</text>

  <rect x="774" y="444" width="170" height="22" rx="5" fill="#2d0f0f" stroke="#f85149" stroke-width="1"/>
  <text x="859" y="459" text-anchor="middle" fill="#f85149" font-size="9">Promise.reject(new Error(...))</text>

  <!-- ══════════ ARROWS ══════════ -->

  <!-- Main thread → Task Queue -->
  <line x1="212" y1="155" x2="258" y2="170" stroke="#f0883e" stroke-width="1.8" marker-end="url(#arr-orange)"/>
  <text x="226" y="152" text-anchor="middle" fill="#f0883e" font-size="8.5">push</text>

  <!-- Task Queue → Workers -->
  <line x1="445" y1="310" x2="496" y2="310" stroke="#3fb950" stroke-width="1.8" marker-end="url(#arr-green)"/>
  <text x="471" y="304" text-anchor="middle" fill="#3fb950" font-size="8.5">_executeTask()</text>

  <!-- Workers → worker.js -->
  <line x1="710" y1="160" x2="758" y2="160" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arr-yellow)"/>
  <text x="734" y="153" text-anchor="middle" fill="#e3b341" font-size="8">postMessage</text>

  <!-- worker.js → Results -->
  <line x1="859" y1="278" x2="859" y2="296" stroke="#79c0ff" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="895" y="292" text-anchor="middle" fill="#79c0ff" font-size="8">result</text>

  <!-- Results → Main thread (curved) -->
  <path d="M760,395 Q560,540 212,270" fill="none" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-blue)"/>
  <text x="470" y="552" text-anchor="middle" fill="#79c0ff" font-size="8.5">resolve / reject Promise → main thread callback</text>

  <!-- ══════════ LEGEND ══════════ -->
  <rect x="22" y="578" width="936" height="50" rx="8" fill="#161b22" stroke="#30363d"/>
  <text x="42" y="597" fill="#8b949e" font-size="9" font-weight="bold">LEGEND</text>

  <rect x="100" y="587" width="11" height="11" rx="2" fill="#0f2a1a" stroke="#3fb950" stroke-width="1.2"/>
  <text x="116" y="597" fill="#8b949e" font-size="8.5">Active Worker</text>

  <rect x="210" y="587" width="11" height="11" rx="2" fill="#1c2333" stroke="#484f58" stroke-width="1.2"/>
  <text x="226" y="597" fill="#8b949e" font-size="8.5">Idle / Unspawned</text>

  <line x1="355" y1="592" x2="380" y2="592" stroke="#f0883e" stroke-width="2" marker-end="url(#arr-orange)"/>
  <text x="385" y="597" fill="#8b949e" font-size="8.5">Task push / dispatch</text>

  <line x1="490" y1="592" x2="515" y2="592" stroke="#e3b341" stroke-width="1.5" marker-end="url(#arr-yellow)"/>
  <text x="520" y="597" fill="#8b949e" font-size="8.5">postMessage (serialised fn)</text>

  <line x1="655" y1="592" x2="680" y2="592" stroke="#79c0ff" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arr-blue)"/>
  <text x="685" y="597" fill="#8b949e" font-size="8.5">Promise resolve / reject</text>

  <text x="42" y="618" fill="#8b949e" font-size="8">Node.js worker_threads · fn serialised via fn.toString() · eval() in worker · new Worker() per task · worker.terminate() after result</text>
  <text x="850" y="618" fill="#484f58" font-size="8">Custom_Thread_pool</text>

</svg>
